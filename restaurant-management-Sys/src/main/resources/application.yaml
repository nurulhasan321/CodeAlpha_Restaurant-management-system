spring:
  application:
    name: restaurant-management-Sys

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/restaurant_db}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB



jwt:
  secret: ${JWT_SECRET:dev-only-secret-change-in-production-min-32-chars!!}
  expiration-access: ${JWT_ACCESS_EXPIRY:600000}
  expiration-refresh: ${JWT_REFRESH_EXPIRY:604800000}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}
  cookie:
    secure: ${COOKIE_SECURE:false}
