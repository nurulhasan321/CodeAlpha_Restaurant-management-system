spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:restaurant_db}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format-sql: false

server:
  port: 8080
  address: 127.0.0.1
  error:
    include-message: never

jwt:
  secret: ${JWT_SECRET}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS}
  cookie:
    secure: ${COOKIE_SECURE:true}

logging:
  level:
    root: INFO
    com.restaurant: INFO
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 10
